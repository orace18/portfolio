<section id="competences" class="skills section">
  <div class="container">
    <h2 class="section-title" appScrollReveal>Compétences</h2>
    <p class="section-subtitle" appScrollReveal>
      Un socle technique complet, du mobile au backend, pensé pour le marché ouest-africain.
    </p>

    <div class="skills__grid">
      @for (group of skillGroups; track group.category; let i = $index) {
        <div class="skills__card" appScrollReveal [revealDelay]="i * 80">
          <h3 class="skills__category">{{ group.category }}</h3>
          <div class="skills__tags">
            @for (skill of group.skills; track skill) {
              <app-tech-badge [name]="skill" />
            }
          </div>
        </div>
      }
    </div>
  </div>
</section>
