<section id="parcours" class="timeline-section section">
  <div class="container">
    <h2 class="section-title">Parcours</h2>
    <p class="section-subtitle">Une progression continue entre développement mobile et backend.</p>

    <ol class="timeline">
      @for (item of items; track item.period) {
        <li class="timeline__item">
          <div class="timeline__marker"></div>
          <div class="timeline__content">
            <span class="timeline__period">{{ item.period }}</span>
            <h3 class="timeline__title">{{ item.title }}</h3>
            <p class="timeline__place">{{ item.place }}</p>
          </div>
        </li>
      }
    </ol>
  </div>
</section>
