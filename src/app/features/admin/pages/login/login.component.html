<div class="login">
  <form class="login__card" [formGroup]="form" (ngSubmit)="onSubmit()">
    <div class="login__logo">OE</div>
    <h1 class="login__title">Espace admin</h1>
    <p class="login__subtitle">Connectez-vous pour gérer les projets du portfolio.</p>

    <label class="field">
      <span class="field__label">Email</span>
      <input type="email" formControlName="email" autocomplete="username" placeholder="vous@exemple.com" />
    </label>

    <label class="field">
      <span class="field__label">Mot de passe</span>
      <input type="password" formControlName="password" autocomplete="current-password" placeholder="••••••••" />
    </label>

    @if (errorMessage()) {
      <p class="login__error">{{ errorMessage() }}</p>
    }

    <button type="submit" class="btn btn-primary login__submit" [disabled]="submitting()">
      {{ submitting() ? 'Connexion…' : 'Se connecter' }}
    </button>
  </form>
</div>
